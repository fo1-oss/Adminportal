<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crep Dog Crew — Admin Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#111;-webkit-font-smoothing:antialiased}
input,textarea,select,button{font-family:inherit}

/* Nav */
.nav{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{width:38px;height:38px;background:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
.nav-title{font-weight:700;font-size:17px;letter-spacing:-.3px}
.nav-sep{color:#ddd;margin:0 4px}
.nav-sub{color:#6b7280;font-size:13px;font-weight:500}
.nav-badge{background:#4f46e5;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:6px;letter-spacing:.3px}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-user{display:flex;align-items:center;gap:8px;background:#f5f5f5;border-radius:100px;padding:6px 14px 6px 6px}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.nav-name{font-size:14px;font-weight:500;color:#555}
.btn-logout{padding:8px 16px;border:1.5px solid #e5e5e5;background:#fff;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;transition:all .2s}
.btn-logout:hover{background:#fef2f2;border-color:#fecaca}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(165deg,#f8f8ff,#eef2ff)}
.login-card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(79,70,229,.08);border:1px solid #e0e7ff;padding:36px;width:100%;max-width:420px}
.login-header{text-align:center;margin-bottom:28px}
.login-logo{width:56px;height:56px;background:#4f46e5;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:24px;margin:0 auto 14px}
.login-header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.login-header p{color:#6b7280;font-size:14px;margin-top:4px}
.demo-box{background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;padding:14px;margin-bottom:20px;font-size:13px;color:#4338ca}
.demo-box strong{display:block;margin-bottom:6px;font-weight:700}
.demo-box code{display:block;background:#fff;padding:6px 10px;border-radius:6px;font-family:'SF Mono','Fira Code',monospace;color:#111;font-size:12px;margin:3px 0}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;background:#fafafa;outline:none;transition:all .2s}
.form-input:focus{border-color:#4f46e5;background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.btn-login{width:100%;padding:14px;border:none;background:#4f46e5;color:#fff;font-size:15px;font-weight:700;cursor:pointer;border-radius:12px;transition:all .2s}
.btn-login:hover{background:#4338ca}
.alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;margin-top:14px}

/* Content */
.content{max-width:1400px;margin:0 auto;padding:28px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:16px;border:1px solid #eee;padding:20px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;font-weight:600;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-1px;color:#111}
.stat-value.currency{font-size:20px}

/* Tabs */
.tabs{display:inline-flex;gap:4px;background:#eee;border-radius:14px;padding:4px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:10px 22px;border-radius:10px;border:none;background:transparent;font-size:14px;font-weight:500;color:#888;cursor:pointer;transition:all .2s}
.tab.active{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Table */
.card{background:#fff;border-radius:16px;border:1px solid #eee;overflow:hidden}
.card-header{padding:18px 22px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:16px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 20px;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee;background:#fafafa}
td{padding:14px 20px;font-size:14px;border-bottom:1px solid #f5f5f5}
tbody tr:hover td{background:#fafafa}
tbody tr:last-child td{border-bottom:none}
.clickable-row{cursor:pointer}
.clickable-row:hover td{background:#f8f8ff}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.2px}
.badge-submitted{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.badge-approved{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.badge-shipped{background:#ccfbf1;color:#134e4a;border:1px solid #99f6e4}
.badge-authenticated{background:#dcfce7;color:#166534;border:1px solid #86efac}
.badge-consigned{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.badge-available{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-sold{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.badge-rejected-intake{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.badge-rtv{background:#fed7aa;color:#92400e;border:1px solid #fdba74}
.badge-pv-change{background:#fef08a;color:#854d0e;border:1px solid #fde047}
.badge-pending{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}

/* Shoe row */
.shoe-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:12px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #eee;margin-bottom:8px;font-size:13px;align-items:center}
.shoe-row:last-child{margin-bottom:0}
.shoe-label{font-size:10px;text-transform:uppercase;color:#9ca3af;font-weight:600;margin-bottom:2px}

/* Batch card */
.batch-card{border:1.5px solid #e5e5e5;border-radius:14px;padding:18px;margin-bottom:12px;background:#fff;transition:all .2s}
.batch-card:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.batch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.batch-title{font-weight:700;font-size:15px}
.batch-meta{font-size:13px;color:#6b7280;margin-top:2px}
.batch-shoes-grid{display:grid;gap:8px;margin-top:12px}

/* Actions */
.btn-sm{padding:8px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid #e5e5e5}.btn-secondary:hover{background:#eee}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}

/* Form */
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fff;outline:none}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.form-field textarea{resize:none;min-height:80px}

/* Checkbox */
.checkbox-group{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.checkbox-item{display:flex;align-items:center;gap:6px;font-size:13px}
.checkbox-item input{width:18px;height:18px;cursor:pointer}

/* Filter */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:13px;font-weight:500;background:#fff;cursor:pointer;outline:none}
.filter-select:focus{border-color:#4f46e5}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:#9ca3af}
.empty-state .empty-icon{font-size:36px;margin-bottom:8px}
.empty-state .empty-title{font-weight:600;font-size:15px;color:#6b7280;margin-bottom:4px}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.modal-card{background:#fff;border-radius:18px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:22px 24px;border-bottom:1px solid #eee}
.modal-header h2{font-size:18px;font-weight:700}
.modal-header p{font-size:13px;color:#888;margin-top:2px}
.modal-body{padding:24px;max-height:60vh;overflow-y:auto}
.modal-footer{padding:18px 24px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end}

/* Warehouse selector */
.warehouse-selector{display:flex;gap:10px;margin:12px 0}
.warehouse-btn{padding:10px 16px;border:1.5px solid #e5e5e5;border-radius:10px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.warehouse-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}

/* Shoe checklist */
.shoe-checklist{display:grid;gap:12px;margin:12px 0}
.shoe-check-item{display:flex;gap:10px;padding:12px;border:1.5px solid #e5e5e5;border-radius:10px;align-items:center}
.shoe-check-item input{width:18px;height:18px;cursor:pointer}
.shoe-check-details{flex:1;font-size:13px}
.shoe-check-name{font-weight:600}
.shoe-check-meta{color:#6b7280;font-size:12px}

/* Responsive */
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}.shoe-row{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.shoe-row{grid-template-columns:1fr 1fr}.nav-inner{padding:0 16px}.content{padding:16px}.nav-title{display:none}.table{font-size:12px}.modal-card{max-width:calc(100% - 32px)}.tabs{width:100%;overflow-x:auto}}
@media(max-width:640px){.stats-grid{grid-template-columns:1fr}.shoe-row{grid-template-columns:1fr}.nav-inner{height:auto;padding:8px 12px;flex-direction:column;gap:8px}.nav-left,.nav-right{width:100%}.nav-logo{width:32px;height:32px;font-size:14px}.nav-user{width:100%;justify-content:space-between}.content{padding:12px}table{font-size:11px}th,td{padding:8px 6px}button{padding:8px 12px;font-size:12px}.batch-card{padding:12px;margin-bottom:8px}.modal-card{max-width:calc(100% - 24px);width:100%;padding:16px}.form-group{margin-bottom:12px}.form-input{padding:10px 12px;font-size:14px}.filter-bar{gap:6px;flex-wrap:wrap}.filter-select{padding:8px 10px;font-size:12px}}

/* Currency */
.price{font-weight:600}
.fmt{font-variant-numeric:tabular-nums}
</style>
</head>

// ─── API Helpers (try server first, fallback to local demo data) ───
const API_BASE = "";
let useLocalDB = false;

async function api(path, body) {
  if (useLocalDB) return localApi("POST", path, body);
  try {
    const res = await fetch(API_BASE + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  } catch (err) {
    console.warn("API unavailable, using local demo data");
    useLocalDB = true;
    return localApi("POST", path, body);
  }
}

async function apiGet(path) {
  if (useLocalDB) return localApi("GET", path);
  try {
    const res = await fetch(API_BASE + path, {
      method: "GET",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  } catch (err) {
    console.warn("API unavailable, using local demo data");
    useLocalDB = true;
    return localApi("GET", path);
  }
}

// Local demo data handler — simulates server responses
function localApi(method, path, body) {
  // Login
  if (path === "/api/admin/login") {
    const admin = DEMO_DB.admins.find(a => a.email === body.email && a.password === body.password);
    if (!admin) throw new Error("Invalid credentials");
    return admin;
  }
  // GET endpoints
  if (path === "/api/admin/vendors") {
    // Merge in newly registered vendors from vendor portal via localStorage
    try {
      const synced = JSON.parse(localStorage.getItem("cdc_synced_vendors") || "[]");
      synced.forEach(sv => {
        if (!DEMO_DB.vendors.find(v => v.email === sv.email)) DEMO_DB.vendors.push(sv);
      });
    } catch(e) {}
    return DEMO_DB.vendors;
  }
  if (path === "/api/admin/shoes") return DEMO_DB.shoes;
  if (path === "/api/batches") return DEMO_DB.batches;
  if (path === "/api/mrns") {
    // Sync back signature status from vendor portal via localStorage
    try {
      const synced = JSON.parse(localStorage.getItem("cdc_synced_mrns") || "[]");
      synced.forEach(sm => {
        const local = DEMO_DB.mrns.find(m => m.id === sm.id);
        if (local && sm.status === "signed" && local.status !== "signed") {
          local.status = "signed";
          local.signedAt = sm.signedAt;
        }
        // Also add any MRNs that exist in sync but not in local (edge case)
        if (!local) DEMO_DB.mrns.push(sm);
      });
    } catch(e) {}
    return DEMO_DB.mrns;
  }

  // Batch review
  if (path.match(/\/api\/admin\/batches\/(.+)\/review/)) {
    const batchId = path.match(/\/api\/admin\/batches\/(.+)\/review/)[1];
    const batch = DEMO_DB.batches.find(b => b.id === batchId);
    if (batch) {
      batch.status = "reviewed";
      if (body && body.decisions) {
        body.decisions.forEach(d => {
          const shoe = DEMO_DB.shoes.find(s => s.id === d.shoeId);
          if (shoe) shoe.status = d.decision;
        });
      }
    }
    return { success: true };
  }

  // Authentication
  if (path === "/api/admin/shoes/authenticate") {
    if (body && body.results) {
      body.results.forEach(r => {
        const shoe = DEMO_DB.shoes.find(s => s.id === r.shoeId);
        if (shoe) {
          shoe.status = r.result === "passed" ? "authenticated" : "rtv";
          shoe.warehouse = body.warehouse || shoe.warehouse;
        }
      });
    }
    return { success: true };
  }

  // MRN create — auto-populates full shoe details + vendor info for vendor portal
  if (path === "/api/admin/mrn/create") {
    // Count existing MRNs (local DB + any synced ones)
    const allMrns = [...DEMO_DB.mrns];
    try { const synced = JSON.parse(localStorage.getItem("cdc_synced_mrns") || "[]"); allMrns.push(...synced.filter(s => !allMrns.find(m => m.id === s.id))); } catch(e){}
    const mrnId = "MRN-2026-" + String(allMrns.length + 1).padStart(3, "0");
    const mrnShoes = body.shoeIds.map(id => DEMO_DB.shoes.find(x => x.id === id)).filter(Boolean);
    const totalPV = mrnShoes.reduce((sum, s) => sum + (s.purchaseValue || 0), 0);
    const vendorObj = DEMO_DB.vendors.find(v => v.id === body.vendorId);
    const mrn = {
      id: mrnId,
      vendorId: body.vendorId,
      vendorName: body.vendorName,
      shoes: body.shoeIds,
      shoeDetails: mrnShoes.map(s => ({sku:s.sku,brand:s.brand,model:s.model,size:s.size,purchaseValue:s.purchaseValue,mode:"Consign"})),
      vendor: vendorObj ? {name:vendorObj.name,phone:vendorObj.phone||"",email:vendorObj.email||"",pan:vendorObj.pan||"",address:vendorObj.address||""} : {},
      warehouse: body.warehouse,
      totalPV,
      status: "pending_signature",
      createdAt: new Date().toISOString().slice(0,10),
    };
    DEMO_DB.mrns.push(mrn);
    mrnShoes.forEach(s => { s.status = "consigned"; });

    // ── Cross-portal sync via localStorage ──
    // This allows the vendor portal (separate HTML file) to pick up MRNs created here
    try {
      const synced = JSON.parse(localStorage.getItem("cdc_synced_mrns") || "[]");
      synced.push(mrn);
      localStorage.setItem("cdc_synced_mrns", JSON.stringify(synced));
      // Also push a notification for the vendor
      const notifs = JSON.parse(localStorage.getItem("cdc_synced_notifications") || "[]");
      notifs.push({
        id: "n-sync-" + Date.now(),
        vendorId: body.vendorId,
        type: "mrn_ready",
        title: "MRN Ready for Signature",
        message: `${mrnId} is ready for your signature. ${mrnShoes.length} shoes included, total PV ₹${totalPV.toLocaleString("en-IN")}.`,
        read: false,
        createdAt: new Date().toISOString().slice(0, 10),
      });
      localStorage.setItem("cdc_synced_notifications", JSON.stringify(notifs));
    } catch(e) { console.warn("localStorage sync failed:", e); }

    return mrn;
  }

  // PV change
  if (path.match(/\/api\/admin\/shoes\/(.+)\/pv-change/)) {
    const shoeId = path.match(/\/api\/admin\/shoes\/(.+)\/pv-change/)[1];
    const shoe = DEMO_DB.shoes.find(s => s.id === shoeId);
    if (shoe) {
      shoe.pvChangeStatus = "pv_change_pending";
      shoe.pvChangeRequested = body.newPV;
      shoe.pvChangeNote = body.reason;
    }
    return { success: true };
  }

  return { success: true };
}

function generateMrnPdf(mrnData) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p","mm","a4");
  const W = 210, H = 297;
  const M = 15; // margin
  const R = W - M;

  const vendor = mrnData.vendor || {};
  const shoes = mrnData.shoes || [];
  const warehouse = mrnData.warehouse || "Delhi";
  const mrnId = mrnData.mrn_id || "MRN-0001";
  const dateStr = mrnData.date || new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"});
  const emp = mrnData.cdc_employee || {};

  // ─── PAGE 1 ───
  // Date & Ref
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text("Ref: "+mrnId, M, 12);
  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("DATE: "+dateStr, R, 12, {align:"right"});

  // Title
  doc.setFontSize(16); doc.setFont("helvetica","bold");
  doc.text("MATERIAL RECEIVING NOTE", W/2, 22, {align:"center"});

  // Vendor info box
  const vbTop = 28, vbH = 40, vbW = 95;
  doc.setLineWidth(0.3); doc.rect(M, vbTop, vbW, vbH);
  const vFields = [["Name:", vendor.name||""],["Contact No:", vendor.phone||vendor.contact||""],["Email ID:", vendor.email||""],["PAN NO:", vendor.pan||""],["Address:", (vendor.address||"").substring(0,40)]];
  let vy = vbTop + 7;
  vFields.forEach(([label, val]) => {
    doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.text(label, M+2, vy);
    doc.setFont("helvetica","normal");
    doc.text(val, M+25, vy);
    doc.setLineWidth(0.15); doc.line(M+24, vy+1, M+vbW-3, vy+1);
    vy += 7.5;
  });

  // Warehouse box
  const whLeft = 115, whW = R - whLeft;
  doc.setLineWidth(0.3); doc.rect(whLeft, vbTop, whW, vbH);
  let wy = vbTop + 5;
  Object.entries(WAREHOUSES).forEach(([key, wh]) => {
    doc.setFontSize(7); doc.setFont("helvetica","bold");
    const label = key === warehouse ? wh.label + "  \u2713" : wh.label;
    if (key === warehouse) { doc.setTextColor(22,163,74); }
    doc.text(label, whLeft+3, wy);
    doc.setTextColor(0,0,0);
    doc.setFont("helvetica","normal"); doc.setFontSize(6);
    wh.lines.forEach(line => { wy += 3.2; doc.text(line, whLeft+3, wy); });
    wy += 5;
  });

  // ─── Shoe Table ───
  const tTop = vbTop + vbH + 6;
  const cols = [M, M+12, M+35, M+95, M+125, M+140, M+160]; // x positions
  const colR = R;
  const hdrH = 10, rowH = 7;

  // Header
  doc.setFillColor(245,245,245);
  doc.rect(M, tTop, R-M, hdrH, "FD");
  doc.setFontSize(7); doc.setFont("helvetica","bold");
  ["S.NO","SKU","ITEMS DETAILS","SIZE (UK)","QTY","PAYOUT","CONSIGN/\nCASHOUT"].forEach((h,i) => {
    const x = cols[i]+1;
    if (h.includes("\n")) {
      const parts = h.split("\n");
      doc.text(parts[0], x, tTop+4);
      doc.text(parts[1], x, tTop+7.5);
    } else {
      doc.text(h, x, tTop+6);
    }
  });
  // Header column lines
  cols.forEach(x => doc.line(x, tTop, x, tTop+hdrH));
  doc.line(colR, tTop, colR, tTop+hdrH);

  // Data rows (15 rows)
  let ty = tTop + hdrH;
  let totalPV = 0;
  for (let i = 0; i < 15; i++) {
    doc.setLineWidth(0.2);
    doc.rect(M, ty, R-M, rowH);
    cols.forEach(x => doc.line(x, ty, x, ty+rowH));
    doc.line(colR, ty, colR, ty+rowH);

    doc.setFontSize(7); doc.setFont("helvetica","normal");
    doc.text(String(i+1), cols[0]+4, ty+5);

    if (i < shoes.length) {
      const s = shoes[i];
      doc.text((s.sku||"").substring(0,14), cols[1]+1, ty+5);
      doc.text(((s.brand||"")+" "+(s.model||"")).substring(0,30), cols[2]+1, ty+5);
      doc.text(String(s.size||""), cols[3]+4, ty+5);
      doc.text("1", cols[4]+4, ty+5);
      const pv = Number(s.purchaseValue || s.payout || 0);
      totalPV += pv;
      doc.text(pv.toLocaleString("en-IN"), cols[5]+1, ty+5);
      doc.text(s.mode || "Consign", cols[6]+1, ty+5);
    }
    ty += rowH;
  }

  // TOTAL row
  doc.setLineWidth(0.3);
  doc.rect(M, ty, R-M, rowH);
  cols.forEach(x => doc.line(x, ty, x, ty+rowH));
  doc.line(colR, ty, colR, ty+rowH);
  doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("TOTAL", cols[1]+1, ty+5);
  doc.text(String(shoes.length), cols[4]+3, ty+5);
  doc.text(totalPV.toLocaleString("en-IN"), cols[5]+1, ty+5);
  ty += rowH;

  // Signature of seller
  const sigY = ty + 12;
  doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("(Signature of seller)", R-5, sigY, {align:"right"});
  doc.setLineWidth(0.3); doc.line(R-55, sigY-5, R-5, sigY-5);

  // Deal Closed With box
  const dcY = sigY + 4;
  doc.setLineWidth(0.3); doc.rect(M, dcY, 100, 22);
  doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text("DEAL CLOSED WITH (CDC Employee)", M+3, dcY+5);
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Name: "+(emp.name||"-"), M+3, dcY+10);
  doc.text("Phone No: "+(emp.phone||"-"), M+3, dcY+15);
  doc.text("Courier Name: "+(emp.courier||"-"), M+3, dcY+20);

  // ─── PAGE 2: T&C ───
  doc.addPage();
  let cy = 18;
  TC_CLAUSES.forEach(([title, body], i) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(10);
    doc.text("  "+(i+1)+")   "+title, M, cy);
    cy += 5;
    doc.setFont("helvetica","normal"); doc.setFontSize(9);
    const lines = doc.splitTextToSize(body, R-M-5);
    doc.text(lines, M, cy);
    cy += lines.length * 4.2 + 5;
  });

  // FOR CDC USE ONLY
  cy += 5;
  doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("FOR CDC USE ONLY", W/2, cy, {align:"center"});
  cy += 10;
  doc.setLineWidth(0.3); doc.rect(M, cy, R-M, 22);
  doc.setFontSize(10); doc.setFont("helvetica","normal");
  doc.text("NAME:", M+5, cy+8);
  doc.line(M+25, cy+9, M+70, cy+9);
  doc.text("DATE:", M+5, cy+16);
  doc.line(M+25, cy+17, M+70, cy+17);
  doc.setFont("helvetica","bold");
  doc.text("Sign", R-55, cy+12);
  doc.line(R-45, cy+13, R-5, cy+13);

  // Download
  doc.save(mrnId + ".pdf");
  return true;
}

// ─── Batch Review Tab ───
function BatchReviewTab({batches, shoes, vendors, onRefresh}) {
  const [selectedBatch, setSelectedBatch] = useState(null);
  const [batchDecisions, setBatchDecisions] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [filterText, setFilterText] = useState("");
  const [showOnlyExceptions, setShowOnlyExceptions] = useState(false);

  const pendingBatches = batches.filter(b => b.status === "pending");

  const handleDecision = (shoeId, decision) => {
    setBatchDecisions(prev => ({...prev, [shoeId]: decision}));
  };

  /* ── Bulk Actions ── */
  const handleApproveAll = (batchShoes) => {
    const bulk = {};
    batchShoes.forEach(s => { bulk[s.id] = "approved"; });
    setBatchDecisions(prev => ({...prev, ...bulk}));
  };

  const handleRejectAll = (batchShoes) => {
    const bulk = {};
    batchShoes.forEach(s => { bulk[s.id] = "rejected_intake"; });
    setBatchDecisions(prev => ({...prev, ...bulk}));
  };

  const handleSubmitReview = async () => {
    if (!selectedBatch) return;
    const batchShoes = shoes.filter(s => s.batchId === selectedBatch.id);
    const decisions = batchShoes.map(s => ({
      shoeId: s.id,
      decision: batchDecisions[s.id] || "approved",
    }));

    if (decisions.length === 0) {
      alert("No shoes in this batch");
      return;
    }

    setSubmitting(true);
    try {
      await api(`/api/admin/batches/${selectedBatch.id}/review`, {decisions});
      setSelectedBatch(null);
      setBatchDecisions({});
      setFilterText("");
      setShowOnlyExceptions(false);
      await onRefresh();
    } catch (e) {
      alert("Failed to submit review: " + e.message);
    } finally {
      setSubmitting(false);
    }
  };

  if (pendingBatches.length === 0) {
    return <div className="card"><div className="empty-state"><div className="empty-icon">✅</div><div className="empty-title">All batches reviewed</div><p>No pending batches to review.</p></div></div>;
  }

  if (selectedBatch) {
    const batchShoes = shoes.filter(s => s.batchId === selectedBatch.id);
    const vendor = vendors.find(v => v.id === selectedBatch.vendorId);

    /* Filter shoes for display */
    let displayShoes = batchShoes;
    if (filterText) {
      const q = filterText.toLowerCase();
      displayShoes = displayShoes.filter(s =>
        (s.brand + " " + s.model).toLowerCase().includes(q) ||
        (s.sku || "").toLowerCase().includes(q) ||
        (s.size || "").toString().includes(q)
      );
    }
    if (showOnlyExceptions) {
      displayShoes = displayShoes.filter(s => batchDecisions[s.id] === "rejected_intake");
    }

    /* Stats */
    const approvedCount = batchShoes.filter(s => batchDecisions[s.id] === "approved").length;
    const rejectedCount = batchShoes.filter(s => batchDecisions[s.id] === "rejected_intake").length;
    const undecidedCount = batchShoes.length - approvedCount - rejectedCount;
    const totalPV = batchShoes.filter(s => batchDecisions[s.id] === "approved").reduce((sum, s) => sum + (s.purchaseValue || 0), 0);

    return (
      <div>
        <button className="btn-sm btn-secondary" onClick={()=>{setSelectedBatch(null);setFilterText("");setShowOnlyExceptions(false);}} style={{marginBottom:"20px"}}>← Back to Batches</button>
        <div className="card">
          <div className="card-header" style={{flexWrap:"wrap",gap:"12px"}}>
            <div>
              <h3>Review Batch {selectedBatch.id}</h3>
              <p style={{color:"#6b7280",fontSize:"13px",marginTop:"2px"}}>{vendor?.name} · {batchShoes.length} pairs · {selectedBatch.createdAt}</p>
            </div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              <button onClick={()=>handleApproveAll(batchShoes)} style={{padding:"8px 18px",background:"#16a34a",color:"#fff",border:"none",borderRadius:"8px",fontWeight:700,fontSize:"13px",cursor:"pointer"}}>✓ Approve All ({batchShoes.length})</button>
              <button onClick={()=>handleRejectAll(batchShoes)} style={{padding:"8px 18px",background:"#dc2626",color:"#fff",border:"none",borderRadius:"8px",fontWeight:700,fontSize:"13px",cursor:"pointer"}}>✗ Reject All ({batchShoes.length})</button>
            </div>
          </div>

          {/* Summary bar */}
          <div style={{padding:"14px 22px",background:"#f8fafc",borderBottom:"1px solid #eee",display:"flex",gap:"20px",alignItems:"center",flexWrap:"wrap",fontSize:"13px"}}>
            <span style={{color:"#16a34a",fontWeight:700}}>✓ {approvedCount} Approved</span>
            <span style={{color:"#dc2626",fontWeight:700}}>✗ {rejectedCount} Rejected</span>
            {undecidedCount > 0 && <span style={{color:"#92400e",fontWeight:600}}>⏳ {undecidedCount} Undecided</span>}
            <span style={{color:"#6b7280"}}>Total Approved PV: {fmt(totalPV)}</span>
            <div style={{marginLeft:"auto",display:"flex",gap:"8px",alignItems:"center"}}>
              <input value={filterText} onChange={e=>setFilterText(e.target.value)} placeholder="Search by brand, SKU, size..." style={{padding:"6px 12px",border:"1px solid #e5e5e5",borderRadius:"6px",fontSize:"12px",width:"200px"}} />
              <label style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"12px",color:"#555",cursor:"pointer"}}>
                <input type="checkbox" checked={showOnlyExceptions} onChange={e=>setShowOnlyExceptions(e.target.checked)} /> Exceptions only
              </label>
            </div>
          </div>

          {/* Scrollable shoe list */}
          <div style={{maxHeight:"500px",overflowY:"auto",padding:"12px 22px"}}>
            <table style={{width:"100%"}}>
              <thead>
                <tr>
                  <th style={{width:"30%"}}>Item</th>
                  <th>SKU</th>
                  <th>Size</th>
                  <th>Condition</th>
                  <th>PV</th>
                  <th style={{width:"140px"}}>Decision</th>
                </tr>
              </thead>
              <tbody>
                {displayShoes.map((s, i) => {
                  const decision = batchDecisions[s.id] || "";
                  const rowBg = decision === "approved" ? "#f0fdf4" : decision === "rejected_intake" ? "#fef2f2" : "#fff";
                  return (
                    <tr key={s.id} style={{background:rowBg}}>
                      <td style={{fontWeight:600}}>{s.brand} {s.model}</td>
                      <td style={{fontSize:"12px",color:"#6b7280",fontFamily:"monospace"}}>{s.sku || "—"}</td>
                      <td>{s.size}</td>
                      <td><span className="badge badge-submitted">{s.condition}</span></td>
                      <td style={{fontWeight:600}}>{fmt(s.purchaseValue)}</td>
                      <td>
                        <select value={decision} onChange={e=>handleDecision(s.id, e.target.value)} style={{padding:"6px 8px",border:"1.5px solid " + (decision === "approved" ? "#86efac" : decision === "rejected_intake" ? "#fca5a5" : "#e5e5e5"),borderRadius:"6px",fontSize:"12px",background:decision === "approved" ? "#dcfce7" : decision === "rejected_intake" ? "#fee2e2" : "#fff",fontWeight:600,width:"100%"}}>
                          <option value="">—</option>
                          <option value="approved">✓ Approve</option>
                          <option value="rejected_intake">✗ Reject</option>
                        </select>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {displayShoes.length === 0 && <div style={{padding:"30px",textAlign:"center",color:"#9ca3af",fontSize:"14px"}}>No shoes match your filter</div>}
          </div>

          {/* Footer actions */}
          <div style={{padding:"16px 22px",borderTop:"1px solid #eee",display:"flex",gap:"10px",justifyContent:"space-between",alignItems:"center",background:"#fafafa"}}>
            <div style={{fontSize:"13px",color:"#6b7280"}}>
              {undecidedCount > 0
                ? <span>⚠ {undecidedCount} undecided pairs will be <strong>auto-approved</strong> on submit</span>
                : <span>✓ All {batchShoes.length} pairs have a decision</span>
              }
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button className="btn-sm btn-secondary" onClick={()=>{setSelectedBatch(null);setFilterText("");setShowOnlyExceptions(false);}}>Cancel</button>
              <button onClick={handleSubmitReview} disabled={submitting} style={{padding:"10px 28px",background:"#4f46e5",color:"#fff",border:"none",borderRadius:"10px",fontWeight:700,fontSize:"14px",cursor:"pointer",opacity:submitting?0.6:1}}>{submitting ? "Submitting..." : `Submit Review (${batchShoes.length} pairs)`}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {pendingBatches.map(b => {
        const batchShoes = shoes.filter(s => s.batchId === b.id);
        const vendor = vendors.find(v => v.id === b.vendorId);
        return (
          <div key={b.id} className="batch-card">
            <div className="batch-header">
              <div>
                <div className="batch-title">{vendor?.name}</div>
                <div className="batch-meta">{b.id} · {batchShoes.length} pairs · {b.createdAt}</div>
              </div>
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                <button style={{padding:"8px 16px",background:"#16a34a",color:"#fff",border:"none",borderRadius:"8px",fontWeight:700,fontSize:"13px",cursor:"pointer"}} onClick={async()=>{
                  const decisions = batchShoes.map(s=>({shoeId:s.id,decision:"approved"}));
                  try{await api(`/api/admin/batches/${b.id}/review`,{decisions});await onRefresh();}catch(e){alert("Error: "+e.message);}
                }}>✓ Quick Approve All</button>
                <button className="btn-sm btn-primary" onClick={()=>{setSelectedBatch(b);setBatchDecisions({});}}>Review Individually</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Authentication Tab ───
function AuthenticationTab({shoes, vendors, onRefresh}) {
  const [warehouse, setWarehouse] = useState("Delhi");
  const [authResults, setAuthResults] = useState({});
  const [submitting, setSubmitting] = useState(false);

  const readyShoes = shoes.filter(s => (s.status === "approved" || s.status === "shipped") && !authResults[s.id]);

  const handleAuthResult = (shoeId, result) => {
    setAuthResults(prev => ({...prev, [shoeId]: result}));
  };

  const handleSubmitAuth = async () => {
    const shoeIds = Object.keys(authResults);
    if (shoeIds.length === 0) {
      alert("Please authenticate at least one shoe");
      return;
    }

    const results = shoeIds.map(id => ({
      shoeId: id,
      result: authResults[id],
    }));

    setSubmitting(true);
    try {
      await api("/api/admin/shoes/authenticate", {
        shoeIds,
        results,
        warehouse,
      });
      setAuthResults({});
      await onRefresh();
      alert("Authentication submitted successfully");
    } catch (e) {
      alert("Failed: " + e.message);
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div>
      <div className="card" style={{marginBottom:"20px"}}>
        <div className="card-header"><h3>Warehouse Authentication</h3></div>
        <div style={{padding:"20px"}}>
          <div className="form-field">
            <label>Select Warehouse</label>
            <div className="warehouse-selector">
              <button className={`warehouse-btn ${warehouse==="Delhi"?"active":""}`} onClick={()=>setWarehouse("Delhi")}>Delhi</button>
              <button className={`warehouse-btn ${warehouse==="Mumbai"?"active":""}`} onClick={()=>setWarehouse("Mumbai")}>Mumbai</button>
            </div>
          </div>
          <div style={{marginTop:"20px",color:"#6b7280",fontSize:"13px"}}>
            {readyShoes.length} shoes ready for authentication
          </div>
        </div>
      </div>

      {readyShoes.length === 0 ? (
        <div className="card"><div className="empty-state"><div className="empty-icon">✅</div><div className="empty-title">No shoes pending</div><p>All shoes have been processed.</p></div></div>
      ) : (
        <div>
          <div className="card">
            <div className="card-header"><h3>Shoe Authentication</h3></div>
            <div style={{padding:"20px"}}>
              <div className="shoe-checklist">
                {readyShoes.map(s => {
                  const vendor = vendors.find(v => v.id === s.vendorId);
                  return (
                    <div key={s.id} className="shoe-check-item">
                      <select value={authResults[s.id] || ""} onChange={e=>handleAuthResult(s.id, e.target.value)} style={{padding:"8px 10px",border:"1px solid #e5e5e5",borderRadius:"6px",fontSize:"13px"}}>
                        <option value="">Select Result</option>
                        <option value="passed">Passed</option>
                        <option value="failed">Failed (RTV)</option>
                      </select>
                      <div className="shoe-check-details">
                        <div className="shoe-check-name">{s.brand} {s.model}</div>
                        <div className="shoe-check-meta">{s.size} · {s.condition} · {vendor?.name}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:"20px",display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                <button className="btn-sm btn-success" onClick={handleSubmitAuth} disabled={submitting||Object.keys(authResults).length===0}>{submitting?"Submitting...":"Submit Authentication"}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MRN Management Tab ───
function MRNManagementTab({shoes, vendors, mrns, onRefresh}) {
  const [selectedVendor, setSelectedVendor] = useState(null);
  const [selectedShoes, setSelectedShoes] = useState([]);
  const [warehouse, setWarehouse] = useState("Delhi");
  const [submitting, setSubmitting] = useState(false);

  const authenticatedShoes = shoes.filter(s => s.status === "authenticated");
  const vendorShoes = selectedVendor ? authenticatedShoes.filter(s => s.vendorId === selectedVendor) : [];

  const handleShoeSelect = (shoeId) => {
    setSelectedShoes(prev =>
      prev.includes(shoeId) ? prev.filter(id => id !== shoeId) : [...prev, shoeId]
    );
  };

  const handleCreateMRN = async () => {
    if (!selectedVendor || selectedShoes.length === 0) {
      alert("Select vendor and at least one shoe");
      return;
    }

    const vendor = vendors.find(v => v.id === selectedVendor);
    const mrnShoes = shoes.filter(s => selectedShoes.includes(s.id));
    setSubmitting(true);
    try {
      const res = await api("/api/admin/mrn/create", {
        vendorId: selectedVendor,
        vendorName: vendor.name,
        shoeIds: selectedShoes,
        warehouse,
      });

      // MRN auto-sent to vendor portal
      setSelectedVendor(null);
      setSelectedShoes([]);
      await onRefresh();
    } catch (e) {
      alert("Failed: " + e.message);
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div>
      {authenticatedShoes.length > 0 && (
        <div className="card" style={{marginBottom:"20px"}}>
          <div className="card-header"><h3>Create MRN</h3></div>
          <div style={{padding:"20px"}}>
            <div className="form-field">
              <label>Select Vendor</label>
              <select value={selectedVendor || ""} onChange={e=>setSelectedVendor(e.target.value || null)} className="filter-select">
                <option value="">Choose Vendor...</option>
                {vendors.filter(v => authenticatedShoes.some(s => s.vendorId === v.id)).map(v => (
                  <option key={v.id} value={v.id}>{v.name}</option>
                ))}
              </select>
            </div>

            {selectedVendor && (
              <>
                <div className="form-field">
                  <label>Warehouse</label>
                  <div className="warehouse-selector">
                    <button className={`warehouse-btn ${warehouse==="Delhi"?"active":""}`} onClick={()=>setWarehouse("Delhi")}>Delhi</button>
                    <button className={`warehouse-btn ${warehouse==="Mumbai"?"active":""}`} onClick={()=>setWarehouse("Mumbai")}>Mumbai</button>
                  </div>
                </div>

                <div className="form-field">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <label>Select Shoes ({selectedShoes.length} of {vendorShoes.length})</label>
                    <button className="btn-sm btn-secondary" style={{padding:"4px 12px",fontSize:11}} onClick={()=>setSelectedShoes(selectedShoes.length===vendorShoes.length?[]:vendorShoes.map(s=>s.id))}>{selectedShoes.length===vendorShoes.length?"Deselect All":"Select All"}</button>
                  </div>
                  <div className="shoe-checklist">
                    {vendorShoes.map(s => (
                      <label key={s.id} className="shoe-check-item" style={{cursor:"pointer"}}>
                        <input type="checkbox" checked={selectedShoes.includes(s.id)} onChange={()=>handleShoeSelect(s.id)} />
                        <div className="shoe-check-details">
                          <div className="shoe-check-name">{s.brand} {s.model}</div>
                          <div className="shoe-check-meta">{s.size} · {s.condition} · PV: {fmt(s.purchaseValue)}</div>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>

                <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                  <button className="btn-sm btn-secondary" onClick={()=>{setSelectedVendor(null);setSelectedShoes([]);}}>Cancel</button>
                  <button className="btn-sm btn-success" onClick={handleCreateMRN} disabled={submitting||selectedShoes.length===0}>{submitting?"Sending...":"Create & Send to Vendor"}</button>
                </div>

      <div className="card">
        <div className="card-header"><h3>MRNs ({mrns.length})</h3></div>

                return (

// ─── PV Changes Tab ───
function PVChangesTab({shoes, vendors, onRefresh}) {
  const [selectedShoeId, setSelectedShoeId] = useState(null);
  const [newPrice, setNewPrice] = useState("");
  const [note, setNote] = useState("");
  const [submitting, setSubmitting] = useState(false);

  const eligibleShoes = shoes.filter(s => (s.status === "consigned" || s.status === "available"));

  const handleRequestPVChange = async () => {
    if (!selectedShoeId || !newPrice) {
      alert("Select shoe and enter new price");
      return;
    }

    setSubmitting(true);
    try {
      await api(`/api/admin/shoes/${selectedShoeId}/pv-change`, {
        newPV: Number(newPrice),
        reason: note || "Price adjustment",
      });
      setSelectedShoeId(null);
      setNewPrice("");
      setNote("");
      await onRefresh();
      alert("PV change request submitted");
    } catch (e) {
      alert("Failed: " + e.message);
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div>
      {eligibleShoes.length > 0 && (
        <div className="card" style={{marginBottom:"20px"}}>
          <div className="card-header"><h3>Request PV Change</h3></div>
          <div style={{padding:"20px"}}>
            <div className="form-field">
              <label>Select Shoe</label>
              <select value={selectedShoeId || ""} onChange={e=>setSelectedShoeId(e.target.value || null)} className="filter-select">
                <option value="">Choose Shoe...</option>
                {eligibleShoes.map(s => {
                  const vendor = vendors.find(v => v.id === s.vendorId);
                  return (
                    <option key={s.id} value={s.id}>{s.brand} {s.model} ({s.size}) - {vendor?.name}</option>
                  );
                })}
              </select>
            </div>

            {selectedShoeId && (
              <>

                  const shoe = shoes.find(s => s.id === selectedShoeId);

                      <div>Current PV: <span className="price">{fmt(shoe.purchaseValue)}</span></div>
                    </div>
                  );

                <div className="form-field">
                  <label>New Price (₹)</label>
                  <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} placeholder="Enter new price" />
                </div>

                <div className="form-field">
                  <label>Reason/Note (optional)</label>
                  <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Why is the price changing?" />
                </div>

                <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
                  <button className="btn-sm btn-secondary" onClick={()=>{setSelectedShoeId(null);setNewPrice("");setNote("");}}>Cancel</button>
                  <button className="btn-sm btn-primary" onClick={handleRequestPVChange} disabled={submitting||!newPrice}>{submitting?"Submitting...":"Request PV Change"}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-header"><h3>PV Change Requests</h3></div>
        {shoes.filter(s => s.pvChangeStatus).length === 0 ? (
          <div className="empty-state"><div className="empty-icon">💰</div><div className="empty-title">No PV changes</div></div>
        ) : (
          <table>
            <thead><tr><th>Shoe</th><th>Vendor</th><th>Current PV</th><th>Requested PV</th><th>Reason</th><th>Status</th></tr></thead>
            <tbody>
              {shoes.filter(s => s.pvChangeStatus).map(s => {
                const vendor = vendors.find(v => v.id === s.vendorId);
                return (
                  <tr key={s.id}>
                    <td>{s.brand} {s.model}</td>
                    <td>{vendor?.name}</td>
                    <td className="price fmt">{fmt(s.purchaseValue)}</td>
                    <td className="price fmt">{fmt(s.pvChangeRequested)}</td>
                    <td style={{fontSize:"12px",color:"#6b7280"}}>{s.pvChangeNote}</td>
                    <td><StatusBadge status={s.pvChangeStatus} /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Error Boundary ───
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("React Error Boundary caught:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        React.createElement("div", {style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:"16px",padding:"40px"}},
          React.createElement("div", {style:{fontSize:"48px"}}, "⚠️"),
          React.createElement("h2", {style:{fontWeight:700}}, "Something went wrong"),
          React.createElement("pre", {style:{background:"#f5f5f5",padding:"16px",borderRadius:"8px",maxWidth:"600px",overflow:"auto",fontSize:"12px",color:"#dc2626"}}, String(this.state.error)),
          React.createElement("button", {onClick:()=>window.location.reload(), style:{padding:"10px 20px",background:"#111",color:"#fff",border:"none",borderRadius:"8px",cursor:"pointer"}}, "Reload Page")
        )
      );
    }
    return this.props.children;
  }
}

// ─── App ───
function App() {
  const [admin, setAdmin] = useState(null);
  if (!admin) return <LoginPage onLogin={setAdmin} />;
  return <Dashboard admin={admin} onLogout={() => setAdmin(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
